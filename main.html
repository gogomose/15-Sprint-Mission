<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
</head>
<body>
    <header>
        <img class="logo" src="logo.png" alt="판다마켓 로고">
        <a class="login_button" href="/login">로그인</a>
    </header>

    <section class="top">
        <div class="container">
            <div class="content">
                    <h1 class="content-title">
                        일상의 모든 물건을<br>
                        거래해 보세요
                    </h1>
                    <a class="shopping_button" href="/items">구경하러 가기</a>
            </div>
            <img src="Img_home_top.png">
        </div>
    </section>

    <main>
        <section>
            <div class="container">
                <img src="Img_home_01.png">
                <div>
                    <p>Hot item</p>
                    <h1>인기 상품을<br>확인해보세요</h1>
                    <p>가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</p>
                </div>
            </div>
        </section>
        <section>
            <div class="container">
                <div>
                    <p>Search</p>
                    <h1>구매를 원하는<br>상품을 검색하세요</h1>
                    <p>구매하고 싶은 물품을 검색해서<br>쉽게 찾아보세요</p>
                </div>
                <img src="Img_home_02.png">
            </div>
        </section>
        <section>
            <div class="container">
                <img src="Img_home_03.png">
                <div>
                    <p>Register</p>
                    <h1>판매를 원하는<br>상품을 등록하세요</h1>
                    <p>어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
                </div>
            </div>
        </section>
    </main>

    <section class="bottom">
        <div class="container">
            <h1 class="content-title">
                믿을 수 있는<br>
                판다마켓 중고 거래
            </h1>
            <img src="Img_home_bottom.png">
        </div>
    </section>

    <footer>
        <div class="footer-wrap container">
            <span class="codeit">@codeit - 2024</span>
            <div class="link">
                <a href="/privacy">Privacy Policy</a>
                <a href="/faq">FAQ</a>
            </div>
            <div class="sns">
                <a href="https://www.facebook.com/?locale=ko_KR"><img src="ic_facebook.png" alt="facebook"></a>
                <a href="https://x.com/?lang=ko"><img src="ic_twitter.png" alt="twitter"></a>
                <a href="https://www.youtube.com/"><img src="ic_youtube.png" alt="youtube"></a>
                <a href="https://www.instagram.com/"><img src="ic_instagram.png" alt="instagram"></a>
            </div>
        </div>
    </footer>
</body>
</html>
