<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
</head>
<body style="display: flex;justify-content: center;align-items: center;">
  <form style=" background-color:box-sizing: border-box;margin:16px auto;width: 360px;display: flex;flex-direction: column;padding: 0.6rem;gap: 0.3rem;border-radius: 20px;">
    <label for="username" style="margin-left: 0.6rem;font-size: 0.8em;font-weight: 500;">아이디</label>
    <input id="username" name="username" placeholder="아이디를 입력해주세요." style="margin:0.1rem 0.6rem 0;height:2rem">
    <label for="password" style="margin-left: 0.6rem;font-size: 0.8em;font-weight: 500;">비밀번호</label>
    <input id="password" name="password" type="password" placeholder="비밀번호를 입력해주세요." style="margin:0.1rem 0.6rem 0;height: 2rem;">
    <button style="margin:0.3rem 0.6rem;background-color: black;color: #ffffff;display: flex;align-items: center;justify-content: center;height: 2.5rem;border-radius: 10px;">
      로그인
    </button>
</body>
</html>
