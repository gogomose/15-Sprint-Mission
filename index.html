<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panda_login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    <div class="logo"><a href="/">
    <img src="images/logo/panda-market-logo.png" width="396px" height="132px"></a>
    </div>
 
    <div class="login_box">
    
      
    <label for="emial">이메일</label>
    <input type="email" id="email" placeholder="codeit@email.com">
    
    
    <label for="password">비밀번호</label>
    <div class="password_wrapper">
    <input type="password" id="password" placeholder="••••••••"> 
    <img class="eye" src="images/btn_visibility_on_24px.png" width="24px" height="24px">
    </div>

    <button class="login_btn">로그인</button>
  </div>
  <div class="social">
  <div class="social_login">
    <div class="social_icon">
      <a href="http://www.kakaocorp.com/page/">
      <img src="images/social/Component 3.png"></a></div>
    
    <div class="social_icon"><a href="https://www.google.com/"><img src="images/social/Component 2.png"></a></div>
  </div>
</div>
  <div class="signup">
    판다마켓에 처음이신가요? <a href="signup.html">회원가입</a>
  </div>
  </div>
  
</body>
</html>
