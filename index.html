<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다마켓</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <img src="/images/logo.png" alt="logo" width="153px" height="51px">
            <button class="header-button">로그인</button>
        </div>

    </header>

    <div class="top">
        <div class="top-content">
            <div class="top-content-text">
                <h2>일상의 모든 물건을<br>거래해 보세요</h2>
                <a href="/items" class="items-a">구경하러 가기</a>

            </div>
           
            <img src="/images/topImg.png" alt="topImg" width="746px" height="340px">

        </div>

    </div>

    <section class="section">

        <div class="section-content">
            <div class="section-card">
                <img src="/images/card1.png" alt="card1" width="579px" height="444px">
                <div class="section-text">
                    <p class="section-text-top">Hot item</p>
                    <p class="section-text-middle">인기 상품을<br>확인해 보세요</p>
                    <p class="section-text-bottom">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</p>
                </div>
                
            </div>
        </div>

        <div class="section-content">
            <div class="section-card">
               
                <div class="section-text right-align">
                    <p class="section-text-top">Search</p>
                    <p class="section-text-middle">구매를 원하는<br>상품을 검색하세요</p>
                    <p class="section-text-bottom">구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p>
                </div>

                <img src="/images/card2.png" alt="card2" width="579px" height="444px">
                
            </div>
        </div>

        <div class="section-content">
            <div class="section-card">
                <img src="/images/card3.png" alt="card3" width="579px" height="444px">
                <div class="section-text">
                    <p class="section-text-top">Register</p>
                    <p class="section-text-middle">판매를 원하는<br>상품을 등록하세요</p>
                    <p class="section-text-bottom">어떤 물건이든 판매하고싶은 상품을<br>쉽게 등록하세요</p>
                </div>
                
            </div>
        </div>
       
    </section>

    <div class="bottom">
        <div class="bottom-content">
            <div class="bottom-content-text">
                <h2>믿을 수 있는<br>판다마켓 중고 거래</h2>
              
            </div>
           
            <img src="/images/bottomImg.png" alt="bottomImg" width="746px" height="397px">

        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left-text">
                <p>@codeit - 2024</p>
            </div>
        
            <div class="footer-middle-text">
                <p>Privacy Policy</p>
                <p>FAQ</p>
            </div>
            <div class="footer-icons">
                <a href="https://www.facebook.com/" target="_blank">
                    <img src="/images/icons/ic_facebook.png" alt="facebook">
                </a>
                <a href="https://x.com/" target="_blank">
                    <img src="/images/icons/ic_twitter.png" alt="twitter">
                </a>
                <a href="https://www.youtube.com/" target="_blank">
                    <img src="/images/icons/ic_youtube.png" alt="youtube">
                </a>
                <a href="https://www.instagram.com/" target="_blank">
                    <img src="/images/icons/ic_instagram.png" alt="instagram">
                </a>
            </div>
        </div>

    </footer>
    
</body>
</html>
